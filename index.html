    <title>School ERP</title>
    <!-- Apply theme immediately to prevent flash -->
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('app-theme-settings');
          if (savedTheme) {
            var settings = JSON.parse(savedTheme);
            // Check for any dashboard context that has dark mode
            var isDark = false;
            if (settings) {
              for (var key in settings) {
                if (settings[key] && settings[key].mode === 'dark') {
                  isDark = true;
                  break;
                }
              }
            }
            if (isDark) {
              document.documentElement.classList.add('dark');
              document.documentElement.style.colorScheme = 'dark';
            } else {
              document.documentElement.classList.remove('dark');
              document.documentElement.style.colorScheme = 'light';
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Runtime-config allows setting env on the server without rebuild -->
    <!-- Use absolute path so nested routes don't resolve it incorrectly -->
    <script src="/runtime-config.js"></script>

  </body>
