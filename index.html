      font-src 'self' data: https://fonts.gstatic.com; 
      connect-src 'self' https://gqieuyjlpkzfmuedxqiu.supabase.co https://fleelskwjczkamvphvdf.supabase.co https://fexjccrkgaeafyimpobv.supabase.co https://bjuteyzpcpbittmdzveq.supabase.co https://devapi.jashcharerp.com http://localhost:* https://*.jashchar.in https://*.edunexttechnologies.com https://*.up.railway.app https://api.postalpincode.in https://cdn.jsdelivr.net ws://localhost:* wss://*;

    <!-- PWA Dynamic Manifest (will be set by OrganizationContext) -->
    <link rel="manifest" id="app-manifest" href="/manifest.json" />
    
    <!-- PWA Theme Color (will be updated dynamically) -->
    <meta name="theme-color" content="#1976d2" id="theme-color-meta" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <title>School ERP</title>
    
    <!-- Dynamic Manifest Setup -->
    <script>
      (function() {
        try {
          // Extract subdomain for organization
          const hostname = window.location.hostname;
          let orgSlug = 'demo';
          
          if (hostname !== 'localhost' && hostname !== '127.0.0.1') {
            const parts = hostname.split('.');
            if (parts.length >= 3) {
              orgSlug = parts[0];
            }
          } else {
            // Development mode - check localStorage
            orgSlug = localStorage.getItem('dev-org-slug') || 'demo';
          }
          
          // Set dynamic manifest URL
          const apiUrl = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000'
            : 'https://devapi.jashcharerp.com';
          
          const manifestLink = document.getElementById('app-manifest');
          if (manifestLink && orgSlug) {
            manifestLink.href = apiUrl + '/api/public/manifest.json?org=' + orgSlug;
          }
        } catch (e) {
          console.error('Error setting up manifest:', e);
        }
      })();
    </script>
    <!-- Apply theme immediately to prevent flash -->
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('app-theme-settings');
          if (savedTheme) {
            var settings = JSON.parse(savedTheme);
            // Check for any dashboard context that has dark mode
            var isDark = false;
            if (settings) {
              for (var key in settings) {
                if (settings[key] && settings[key].mode === 'dark') {
                  isDark = true;
                  break;
                }
              }
            }
            if (isDark) {
              document.documentElement.classList.add('dark');
              document.documentElement.style.colorScheme = 'dark';
            } else {
              document.documentElement.classList.remove('dark');
              document.documentElement.style.colorScheme = 'light';
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Runtime-config allows setting env on the server without rebuild -->
    <!-- Use absolute path so nested routes don't resolve it incorrectly -->
    <script src="/runtime-config.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
