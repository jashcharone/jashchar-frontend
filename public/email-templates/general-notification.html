<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { text-align: center; border-bottom: 1px solid #e9e9e9; padding-bottom: 20px; margin-bottom: 20px; }
        .header h1 { color: #2a3a4b; }
        .content { line-height: 1.6; }
        .content h1, .content h2, .content h3 { color: #2a3a4b; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ .school_name }}</h1>
        </div>
        <div class="content">
            <p>Dear {{ .recipient_name }},</p>
            <h2>{{ .title }}</h2>
            <div>{{ .message_body }}</div>
        </div>
        <div class="footer">
            <p>This is an automated notification from Jashchar ERP.</p>
            <p>&copy; 2024 Jashchar ERP. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
